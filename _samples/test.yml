clean_before_run: true
prefix: 'qoliber'
entities:
  category:
    count: "1/2/3"
    attributes:
      name: "resolver:category_name"
      include_in_menu: 1
      is_active: 1
      is_anchor: 1
      custom_use_parent_settings: 0
      custom_apply_to_products: 0
    tasks:
      - 'category:generate_url_attributes'

  website:
    count: 1
    stores_per_website: 2
    tasks:
      - 'category:generate_urls'
      - 'website:assign_sales_channel'

  customer_group:
    count: 2

  stock:
    msi_sources_count: 2
    msi_stock_count: 2
    tasks:
      - 'stock:link_sources'

  custom_attributes:
    dropdown:
      count: 2
      options_per_attribute: 3
      product_assignment_percent: 60
      searchable: true
      filterable: true
    multiselect:
      count: 1
      options_per_attribute: 3
      product_assignment_percent: 40
      searchable: true
      filterable: true

  product:
    types:
      simple:
        count: 20
      configurable:
        count: 3
        options: [2, 2]
      bundle:
        count: 3
        options:
          checkbox: 2
          select: 2
      grouped:
        count: 3
        options: [3]
    attributes:
      name: "resolver:name"
      price: 499
      status: 1
      tax_class_id: 2
      visibility: 4
      weight: 1.00
    custom_options:
      count: 5
      options_per_product: 2
      values_per_option: 3
    tier_prices:
      levels: 3
    tasks:
      - 'product:assign_to_categories'
      - 'product:assign_to_type_categories'
      - 'product:assign_custom_attributes'
      - 'product:assign_custom_options'
      - 'product:assign_tier_prices'
      - 'product:assign_stock'
      - 'product:assign_to_websites'
      - 'product:generate_url_keys'
      - 'product:generate_urls'

  catalog_rules:
    count: 2
    discount_type: by_percent
    discount_range: [5, 20]

  commands:
    tasks:
      - 'command:indexer:reindex'
      - 'command:cache:flush'
